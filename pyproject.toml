[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wxparser"
version = "0.1.0"
description = "Offline NOAA Weather Radio (NWR) capture, transcription, and dedup pipeline"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
# Phase 1 deliberately has NO third-party runtime deps: audio capture is the
# `arecord` subprocess (process boundary, honours PLAN §2.2) and STT is the
# whisper.cpp `whisper-cli` subprocess. Phase 2 (novelty gating) adds numpy/etc.
dependencies = []

[project.scripts]
wxparser = "wxparser.main:main"

[tool.setuptools]
packages = ["wxparser"]
