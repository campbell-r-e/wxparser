[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "wxparser"
version = "0.1.0"
description = "Offline NOAA Weather Radio (NWR) capture, transcription, and dedup pipeline"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
# Audio capture is the `arecord` subprocess (process boundary, honours PLAN §2.2)
# and STT is the whisper.cpp `whisper-cli` subprocess. The only in-process dep is
# numpy (BSD), for the Phase 2 VAD + spectral fingerprint / novelty gate.
dependencies = ["numpy>=1.24"]

[project.scripts]
wxparser = "wxparser.main:main"
wxparser-api = "wxparser.api:main"

[tool.setuptools]
packages = ["wxparser"]
